<html lang="en-us">
  <head>
    <meta charset="utf-8" />
    <meta content="text/html; charset=utf-8" http-equiv="Content-Type" />
    <link rel="icon" href="data:," />
    <title>SciChart.js 2D Charts</title>
    <script async type="text/javascript" src="bundle.js"></script>
    <link rel="stylesheet" href="src/index.css" />
    <style>
      body {
        font-family: "Arial";
      }
    </style>
  </head>
  <body>
    <h1>SciChart.js 2D Charts</h1>

    <!-- the Div where the SciChartSurface will reside -->
    <div id="scichart-root" style="width: 800px; height: 600px"></div>

    <h1>Zoom to Fit</h1>
    <div id="scichart-zoom-to-fit" style="width: 800px; height: 600px"></div>
    <div style="margin-top: 8px">
      <button id="btn-stop">Stop</button>
      <button id="btn-start">Start</button>
      <button id="btn-reset">Reset</button>
    </div>

    <h1>Visible Range</h1>
    <div id="visiable-range" style="width: 800px; height: 600px"></div>
    <div style="margin-top: 8px">
      <button id="btn-visiable-range-stop">Stop</button>
      <button id="btn-visiable-range-start">Start</button>
      <button id="btn-visiable-range-reset">Reset</button>
    </div>

    <h1>Pan Zoom</h1>
    <div id="pan-zoom" style="width: 800px; height: 600px"></div>
    <div style="margin-top: 8px">
      <button id="btn-pan-zoom-stop">Stop</button>
      <button id="btn-pan-zoom-start">Start</button>
      <button id="btn-pan-zoom-reset">Reset</button>
    </div>
  </body>
</html>
